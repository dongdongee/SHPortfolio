<header class="sai-header">
    <div class="sai-header__inner">
        <h1 class="sai-header__logo">
            <img src="/assets/svg/ico_logo.svg" />
            <a href="/sai/">SAI Workspace</span></a>
        </h1>
        <div class="sai-header__util">
            <div class="sai-header__theme" data-theme="dark">

                <div class="sai-header__credit">
                    <div class="sai-header__credit-status">
                        <div class="sai-header__credit-ico"></div>
                        <div class="sai-header__credit-progress">Credits</div>
                    </div>
                    <span class="sai-header__credit-value">12,480</span>
                </div>

                <button class="sai-header__button sai-header__button-light is-active" type="button" data-value="light">
                    <span class="sai-header__button-ico"></span>
                    <span class="sai-header__button-text">Light Mode</span>
                </button>

                <button class="sai-header__button sai-header__button-dark" type="button" data-value="dark">
                    <span class="sai-header__button-ico"></span>
                    <span class="sai-header__button-text">Dark Mode</span>
                </button>
                <button class="sai-header__button sai-header__button-setting">
                    <span class="sai-header__button-ico"></span>
                    <span class="sai-header__button-text">settings</span>
                </button>
                <button class="sai-header__button sai-header__button-user">
                    <span class="sai-header__button-ico">S</span>
                </button>
            </div>
        </div>

    </div>
</header>
